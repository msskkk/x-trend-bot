    body { font-family: 'Inter', sans-serif; }

    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(99,102,241,0.25); border-left: 3px solid #818cf8; color: #c7d2fe; }
    .card { background: #1e2130; border: 1px solid rgba(255,255,255,0.07); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }
  </style>
</head>

        </div>

<script>
// ========== GitHub API Helper ==========
const GITHUB_API = 'https://api.github.com';
let allPosts = [];
let genresList = [];
let currentFilter = null;

const genreColorMap = {
  stocks:  { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20', dot: 'bg-blue-400', bar: 'bg-blue-400' },
  crypto:  { bg: 'bg-orange-500/10', text: 'text-orange-400', border: 'border-orange-500/20', dot: 'bg-orange-400', bar: 'bg-orange-400' },
  fx:      { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/20', dot: 'bg-emerald-400', bar: 'bg-emerald-400' }
};
const defaultColor = { bg: 'bg-indigo-500/10', text: 'text-indigo-400', border: 'border-indigo-500/20', dot: 'bg-indigo-400', bar: 'bg-indigo-400' };

function getSettings() {
  return {
    token: localStorage.getItem('gh_token') || '',
    repo: localStorage.getItem('gh_repo') || 'msskkk/x-trend-bot',
    branch: localStorage.getItem('gh_branch') || 'main'
  };
}

function hasSettings() { return !!localStorage.getItem('gh_token'); }

function openSettings() {
  const s = getSettings();
  document.getElementById('settings-token').value = s.token;
  document.getElementById('settings-repo').value = s.repo;
  document.getElementById('settings-branch').value = s.branch;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const repo = document.getElementById('settings-repo').value.trim() || 'msskkk/x-trend-bot';
  const branch = document.getElementById('settings-branch').value.trim() || 'main';
  if (!token) { showToast('トークンを入力してください', 'error'); return; }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_branch', branch);
  document.getElementById('settings-modal').classList.add('hidden');
  showToast('設定を保存しました', 'success');
  loadPage();
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast px-4 py-3 rounded-xl text-sm flex items-center gap-2 ' +
    (type === 'error' ? 'bg-red-500/10 text-red-300 border border-red-500/20' : 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/20');
  const icon = type === 'error'
    ? '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
    : '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function readFile(path) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}?ref=${s.branch}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`Failed to read ${path}: ${resp.status}`);
  const data = await resp.json();
  const base64 = data.content.replace(/\s/g, '');
  const raw = await fetch('data:application/json;base64,' + base64);
  const content = await raw.json();
  return { content, sha: data.sha };
}

// ========== Page Logic ==========
async function loadPage() {
  try {
    document.getElementById('api-status').textContent = '読み込み中...';
    const [historyData, genresData] = await Promise.all([
      readFile('config/history.json'),
      readFile('config/genres.json')
    ]);

    allPosts = historyData.content.posts || [];
    genresList = genresData.content.genres || [];

    document.getElementById('api-status').textContent = 'API 接続済み';
    document.getElementById('api-status').className = 'text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20';

    renderGenreSubmenu();
    renderGenreTabs();
    applyFilter(null);
  } catch (err) {
    console.error(err);
    document.getElementById('api-status').textContent = 'API エラー';
    document.getElementById('api-status').className = 'text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20';
    showToast('データの読み込みに失敗しました: ' + err.message, 'error');
  }
}

function getGenreNameMap() {
  const map = {};
  genresList.forEach(g => { map[g.id] = g.name; });
  return map;
}

function renderGenreSubmenu() {
  const submenu = document.getElementById('genre-submenu');
  const genreColors = { stocks: 'text-blue-400', crypto: 'text-orange-400', fx: 'text-emerald-400' };

  let html = `
    <a href="#" onclick="applyFilter(null); return false;"
       class="genre-sub-link flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition ${currentFilter === null ? 'text-indigo-300 bg-indigo-500/10' : 'text-gray-500 hover:text-gray-300 hover:bg-white/5'}">
      <span class="w-1.5 h-1.5 rounded-full bg-current flex-shrink-0"></span>
      すべて
    </a>`;

  genresList.forEach(g => {
    const colorCls = genreColors[g.id] || 'text-gray-400';
    html += `
      <a href="#" onclick="applyFilter('${g.id}'); return false;"
         class="genre-sub-link flex items-center gap-2 px-3 py-2 rounded-lg text-xs transition ${currentFilter === g.id ? 'text-indigo-300 bg-indigo-500/10' : 'text-gray-500 hover:text-gray-300 hover:bg-white/5'}">
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0 ${colorCls} bg-current"></span>
        ${escapeHtml(g.name)}
      </a>`;
  });

  submenu.innerHTML = html;
}

function renderGenreTabs() {
  const container = document.getElementById('genre-tabs');
  const genreCounts = {};
  genresList.forEach(g => {
    genreCounts[g.id] = allPosts.filter(p => (p.genres || []).includes(g.id)).length;
  });

  let html = `
    <a href="#" onclick="applyFilter(null); return false;"
       class="genre-tab flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition border
         ${currentFilter === null ? 'bg-white/10 text-white border-white/15' : 'text-gray-500 border-transparent hover:bg-white/5 hover:text-gray-300'}">
      すべて
      <span class="text-xs ${currentFilter === null ? 'text-gray-300' : 'text-gray-600'} bg-white/5 px-1.5 py-0.5 rounded-full">${allPosts.length}</span>
    </a>`;

  genresList.forEach(g => {
    const c = genreColorMap[g.id] || defaultColor;
    const isActive = currentFilter === g.id;
    html += `
      <a href="#" onclick="applyFilter('${g.id}'); return false;"
         class="genre-tab flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition border
           ${isActive ? c.bg + ' ' + c.text + ' ' + c.border : 'text-gray-500 border-transparent hover:bg-white/5 hover:text-gray-300'}">
        <span class="w-2 h-2 rounded-full ${c.dot}"></span>
        ${escapeHtml(g.name)}
        <span class="text-xs ${isActive ? c.text : 'text-gray-600'} bg-white/5 px-1.5 py-0.5 rounded-full">${genreCounts[g.id] || 0}</span>
      </a>`;
  });

  container.innerHTML = html;
}

function applyFilter(genreId) {
  currentFilter = genreId;
  const filteredPosts = genreId
    ? allPosts.filter(p => (p.genres || []).includes(genreId))
    : allPosts;

  const currentGenre = genreId ? genresList.find(g => g.id === genreId) : null;

  // Update title
  const titleEl = document.getElementById('page-title');
  if (currentGenre) {
    const c = genreColorMap[genreId] || defaultColor;
    titleEl.innerHTML = `投稿履歴 <span class="text-gray-500 font-normal"> / </span><span class="${c.text}">${escapeHtml(currentGenre.name)}</span>`;
    document.getElementById('breadcrumb').textContent = `投稿履歴 / ${currentGenre.name}`;
  } else {
    titleEl.textContent = '投稿履歴';
    document.getElementById('breadcrumb').textContent = '投稿履歴';
  }

  document.getElementById('post-count-badge').textContent = `${filteredPosts.length} 件`;

  // Stats (only when no filter)
  const statsContainer = document.getElementById('stats-container');
  if (!currentGenre && filteredPosts.length > 0) {
    statsContainer.classList.remove('hidden');
    const total = filteredPosts.length;
    const avgLen = total > 0 ? Math.floor(filteredPosts.reduce((sum, p) => sum + (p.text || '').length, 0) / total) : 0;
    const latest = filteredPosts.length > 0 && filteredPosts[0].posted_at ? filteredPosts[0].posted_at.substring(0, 10) : '--';
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-avg').textContent = avgLen;
    document.getElementById('stat-latest').textContent = latest;
  } else {
    statsContainer.classList.add('hidden');
  }

  renderGenreTabs();
  renderGenreSubmenu();
  renderPosts(filteredPosts);
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  const genreNameMap = getGenreNameMap();

  if (!posts || posts.length === 0) {
    const msg = currentFilter
      ? `「${genresList.find(g => g.id === currentFilter)?.name || currentFilter}」の投稿はまだありません`
      : 'まだ投稿がありません';
    container.innerHTML = `
      <div class="card rounded-2xl px-5 py-20 text-center">
        <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <p class="text-sm text-gray-400 font-medium">${msg}</p>
        <p class="text-xs text-gray-600 mt-1.5">Bot が実行されると、自動投稿の履歴がここに表示されます</p>
      </div>`;
    return;
  }

  let html = '<div class="space-y-4">';
  posts.forEach((post, idx) => {
    const firstGenre = (post.genres || [null])[0];
    const c = genreColorMap[firstGenre] || defaultColor;
    const charCount = (post.text || '').length;
    const charPct = Math.min(Math.round((charCount / 140) * 100), 100);
    const postedAt = post.posted_at ? post.posted_at.substring(0, 10) : '--';
    const postedAtFull = post.posted_at ? post.posted_at.substring(0, 19).replace('T', ' ') : '--';

    // Genre badges
    let badgesHtml = '';
    (post.genres || []).forEach(gid => {
      const gc = genreColorMap[gid] || { bg: 'bg-gray-500/10', text: 'text-gray-400', border: 'border-gray-500/20' };
      badgesHtml += `
        <span class="inline-flex items-center gap-1 text-[11px] ${gc.bg} ${gc.text} border ${gc.border} px-2.5 py-0.5 rounded-full font-medium">
          <span class="w-1.5 h-1.5 rounded-full bg-current"></span>
          ${escapeHtml(genreNameMap[gid] || gid)}
        </span>`;
    });

    // Char bar color
    let barColor = c.bar;
    if (charPct >= 90) barColor = 'bg-red-400';
    else if (charPct >= 75) barColor = 'bg-amber-400';

    html += `
      <div class="card rounded-2xl p-5 hover:border-white/10 transition" id="post-${idx}">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-full flex items-center justify-center flex-shrink-0">
            <svg class="w-4.5 h-4.5 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-sm font-semibold text-white">X Trend Bot</span>
              <span class="text-xs text-gray-500">@xtrend_bot</span>
              <span class="text-gray-700">&middot;</span>
              <span class="text-xs text-gray-500">${postedAt}</span>
            </div>
            <div class="text-xs text-gray-600 mt-0.5">${postedAtFull}</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="copyPost(${idx})"
                    class="copy-btn p-1.5 rounded-lg text-gray-600 hover:text-gray-300 hover:bg-white/5 transition" title="コピー">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="pl-[52px] mb-2 flex flex-wrap gap-1.5">${badgesHtml}</div>

        <div class="pl-[52px]">
          <p id="post-text-${idx}" class="text-sm text-gray-200 leading-relaxed whitespace-pre-wrap">${escapeHtml(post.text || '')}</p>
        </div>

        <div class="pl-[52px] mt-3">
          <div class="flex items-center gap-2">
            <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
              <div class="h-full rounded-full transition-all ${barColor}" style="width: ${charPct}%"></div>
            </div>
            <span class="text-xs ${charCount > 130 ? 'text-amber-400' : 'text-gray-600'}">${charCount}/140</span>
          </div>
        </div>

        <div class="pl-[52px] mt-3 pt-3 border-t border-white/5 flex items-center gap-4">
          ${post.source_user ? `
          <div class="flex items-center gap-1.5 text-gray-600 text-xs">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span>@${escapeHtml(post.source_user)}</span>
          </div>` : ''}
          ${post.trend_keyword ? `
          <div class="flex items-center gap-1.5 text-gray-600 text-xs">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
            </svg>
            <span>${escapeHtml(post.trend_keyword)}</span>
          </div>` : ''}
          <div class="ml-auto flex items-center gap-2">
            <span class="inline-flex items-center gap-1 text-[11px] text-emerald-500/80 bg-emerald-500/10 border border-emerald-500/20 px-2.5 py-0.5 rounded-full">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              投稿済み
            </span>
            ${post.tweet_id ? `
            <a href="https://twitter.com/i/web/status/${post.tweet_id}" target="_blank"
               class="inline-flex items-center gap-1 text-[11px] text-gray-600 hover:text-gray-400 transition px-2 py-0.5 rounded-full hover:bg-white/5">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
              Xで確認
            </a>` : ''}
          </div>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function copyPost(idx) {
  const el = document.getElementById('post-text-' + idx);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const card = document.getElementById('post-' + idx);
    const btn = card.querySelector('.copy-btn');
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
      setTimeout(() => { btn.innerHTML = orig; }, 1500);
    }
    showToast('コピーしました', 'success');
  });
}

// ========== Init ==========
document.addEventListener('DOMContentLoaded', function() {
  if (!hasSettings()) {
    openSettings();
  } else {
    loadPage();
  }
});
</script>
</body>
</html>
