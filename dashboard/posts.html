<html lang="ja">

    body { font-family: 'Inter', sans-serif; }
    .sidebar-link { transition: all 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(99,102,241,0.25); border-left: 3px solid #818cf8; color: #c7d2fe; }
    .card { background: #1e2130; border: 1px solid rgba(255,255,255,0.07); }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 999px; }
    .fade-up { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<script>
// ========== GitHub API Helper ==========
const GITHUB_API = 'https://api.github.com';
let draftsData = null;
let draftsSha = null;
let genresList = [];
let currentTab = 'drafts';
let scheduleDraftId = null;

const genreColorMap = {
  stocks:  { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20' },
  crypto:  { bg: 'bg-orange-500/10', text: 'text-orange-400', border: 'border-orange-500/20' },
  fx:      { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/20' }
};
const defaultGenreColor = { bg: 'bg-gray-500/10', text: 'text-gray-400', border: 'border-gray-500/20' };
function getGenreName(genreId) {
  const g = genresList.find(g => g.id === genreId);
  return g ? g.name : (genreId || '');
}

function getSettings() {
  return {
    token: localStorage.getItem('gh_token') || '',
    repo: localStorage.getItem('gh_repo') || 'msskkk/x-trend-bot',
    branch: localStorage.getItem('gh_branch') || 'main'
  };
}

function hasSettings() { return !!localStorage.getItem('gh_token'); }

function openSettings() {
  const s = getSettings();
  document.getElementById('settings-token').value = s.token;
  document.getElementById('settings-repo').value = s.repo;
  document.getElementById('settings-branch').value = s.branch;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const repo = document.getElementById('settings-repo').value.trim() || 'msskkk/x-trend-bot';
  const branch = document.getElementById('settings-branch').value.trim() || 'main';
  if (!token) { showToast('トークンを入力してください', 'error'); return; }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_branch', branch);
  document.getElementById('settings-modal').classList.add('hidden');
  showToast('設定を保存しました', 'success');
  loadPage();
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast px-4 py-3 rounded-xl text-sm flex items-center gap-2 ' +
    (type === 'error' ? 'bg-red-500/10 text-red-300 border border-red-500/20' : 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/20');
  const icon = type === 'error'
    ? '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
    : '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function readFile(path) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}?ref=${s.branch}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`Failed to read ${path}: ${resp.status}`);
  const data = await resp.json();
  const base64 = data.content.replace(/\s/g, '');
  const raw = await fetch('data:application/json;base64,' + base64);
  const content = await raw.json();
  return { content, sha: data.sha };
}

async function writeFile(path, content, sha, message) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}`;
  const body = {
    message: message || `Update ${path}`,
    content: btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(content, null, 2)))),
    sha: sha,
    branch: s.branch
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`Failed to write ${path}: ${resp.status}`);
  return await resp.json();
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ========== Page Logic ==========
async function loadPage() {
  try {
    document.getElementById('api-status').textContent = '読み込み中...';
    const [dData, gData] = await Promise.all([
      readFile('config/drafts.json'),
      readFile('config/genres.json')
    ]);
    draftsData = dData.content;
    draftsSha = dData.sha;
    genresList = gData.content.genres || [];

    document.getElementById('api-status').textContent = 'API 接続済み';
    document.getElementById('api-status').className = 'text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20';

    updateBadges();
    renderTab();
  } catch (err) {
    console.error(err);
    document.getElementById('api-status').textContent = 'API エラー';
    document.getElementById('api-status').className = 'text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20';
    showToast('データの読み込みに失敗しました: ' + err.message, 'error');
  }
}

function getDraftList() {
  return (draftsData.drafts || []).filter(d => d.status === 'draft');
}

function getScheduledList() {
  return (draftsData.drafts || []).filter(d => d.status === 'scheduled');
}

function updateBadges() {
  const draftList = getDraftList();
  const scheduledList = getScheduledList();
  const dBadge = document.getElementById('draft-count-badge');
  const sBadge = document.getElementById('scheduled-count-badge');
  if (draftList.length > 0) { dBadge.textContent = draftList.length; dBadge.classList.remove('hidden'); }
  else { dBadge.classList.add('hidden'); }
  if (scheduledList.length > 0) { sBadge.textContent = scheduledList.length; sBadge.classList.remove('hidden'); }
  else { sBadge.classList.add('hidden'); }
}

function switchTab(tab) {
  currentTab = tab;
  ['drafts', 'preview', 'scheduled'].forEach(t => {
    const btn = document.getElementById('tab-btn-' + t);
    if (t === tab) {
      btn.className = 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition bg-white/10 text-white';
    } else {
      btn.className = 'flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition text-gray-500 hover:text-gray-300';
    }
  });
  renderTab();
}

function renderTab() {
  const container = document.getElementById('tab-content');
  switch(currentTab) {
    case 'drafts': renderDraftsTab(container); break;
    case 'preview': renderPreviewTab(container); break;
    case 'scheduled': renderScheduledTab(container); break;
  }
}

function updateDraftCounter() {
  const textarea = document.getElementById('draft-textarea');
  if (!textarea) return;
  const len = textarea.value.length;
  const pct = Math.min((len / 140) * 100, 100);
  const counter = document.getElementById('char-counter');
  const bar = document.getElementById('char-bar');
  if (counter) counter.textContent = len + '/140';
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'h-full rounded-full transition-all ' +
      (pct >= 100 ? 'bg-red-500' : pct >= 75 ? 'bg-amber-400' : 'bg-indigo-500');
  }
}

async function saveDraft() {
  const textarea = document.getElementById('draft-textarea');
  const genre = document.getElementById('draft-genre');
  const text = textarea.value.trim();

  if (!text) { showToast('テキストを入力してください', 'error'); return; }

  const draft = {
    id: generateUUID(),
    text: text,
    genre: genre.value,
    status: 'draft',
    created_at: new Date().toISOString(),
    scheduled_at: null
  };

  draftsData.drafts.push(draft);

  try {
    const result = await writeFile('config/drafts.json', draftsData, draftsSha, 'Add draft');
    draftsSha = result.content.sha;
    textarea.value = '';
    updateDraftCounter();
    showToast('下書きを保存しました', 'success');
    updateBadges();
    renderTab();
  } catch (err) {
    draftsData.drafts.pop();
    showToast('保存に失敗しました: ' + err.message, 'error');
  }
}

async function deleteDraft(id) {
  if (!confirm('削除しますか？')) return;
  const idx = draftsData.drafts.findIndex(d => d.id === id);
  if (idx === -1) return;
  const removed = draftsData.drafts.splice(idx, 1)[0];
  try {
    const result = await writeFile('config/drafts.json', draftsData, draftsSha, 'Delete draft');
    draftsSha = result.content.sha;
    showToast('削除しました', 'success');
    updateBadges();
    renderTab();
  } catch (err) {
    draftsData.drafts.splice(idx, 0, removed);
    showToast('削除に失敗しました: ' + err.message, 'error');
  }
}

// ========== SCHEDULE ==========
function openScheduleModal(draftId) {
  scheduleDraftId = draftId;
  document.getElementById('schedule-modal').classList.remove('hidden');
}

function closeScheduleModal(e) {
  if (e && e.target !== document.getElementById('schedule-modal')) return;
  document.getElementById('schedule-modal').classList.add('hidden');
  scheduleDraftId = null;
}

async function confirmSchedule() {
  const dt = document.getElementById('schedule-datetime').value;
  if (!dt) { showToast('日時を選択してください', 'error'); return; }
  if (!scheduleDraftId) return;

  const draft = draftsData.drafts.find(d => d.id === scheduleDraftId);
  if (!draft) return;

  draft.status = 'scheduled';
  draft.scheduled_at = dt;

  try {
    const result = await writeFile('config/drafts.json', draftsData, draftsSha, 'Schedule draft');
    draftsSha = result.content.sha;
    document.getElementById('schedule-modal').classList.add('hidden');
    scheduleDraftId = null;
    showToast('予約を設定しました', 'success');
    updateBadges();
    switchTab('scheduled');
  } catch (err) {
    draft.status = 'draft';
    draft.scheduled_at = null;
    showToast('予約に失敗しました: ' + err.message, 'error');
  }
}

function setPreviewText(text) {
  const el = document.getElementById('preview-text');
  const bar = document.getElementById('preview-bar');
  const count = document.getElementById('preview-count');
  const input = document.getElementById('preview-input');

  if (el) {
    if (text && text.trim()) {
      el.textContent = text;
      el.style.color = '#e7e9ea';
    } else {
      el.innerHTML = '<span class="text-[#71767b] italic text-sm">\u2190 左から下書きを選択するか、テキストを入力してください</span>';
    }
  }
  if (input && input.value !== text) input.value = text;

  const len = (text || '').length;
  const pct = Math.min((len / 140) * 100, 100);
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'h-full rounded-full transition-all ' +
      (pct >= 100 ? 'bg-red-500' : pct >= 75 ? 'bg-amber-400' : 'bg-[#1d9bf0]');
  }
  if (count) count.textContent = len + ' / 140';

  const now = new Date();
  const timeEl = document.getElementById('preview-time');
  if (timeEl) {
    timeEl.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} \u00b7 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  }
}
