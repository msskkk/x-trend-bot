<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>監視ユーザー - X Trend Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar-link { transition: all 0.2s; }
    .sidebar-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-link.active { background: rgba(99,102,241,0.25); border-left: 3px solid #818cf8; color: #c7d2fe; }
    .card { background: #1e2130; border: 1px solid rgba(255,255,255,0.07); }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 999px; }
    .fade-up { animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }
  </style>
</head>
<body class="bg-[#0f1117] text-gray-100 min-h-screen flex">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2"></div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] flex items-center justify-center hidden">
    <div class="card rounded-2xl p-6 w-96 mx-4">
      <h3 class="text-lg font-semibold text-white mb-1">GitHub API 設定</h3>
      <p class="text-xs text-gray-500 mb-5">リポジトリの設定ファイルを読み書きするための認証情報を入力してください。</p>
      <div class="space-y-4">
        <div>
          <label class="block text-xs text-gray-500 mb-1.5 font-medium">GitHub Personal Access Token <span class="text-red-400">*</span></label>
          <input type="password" id="settings-token" placeholder="ghp_xxxxxxxxxxxx"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:bg-white/[0.07] transition">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5 font-medium">リポジトリ (owner/repo)</label>
          <input type="text" id="settings-repo" placeholder="msskkk/x-trend-bot" value="msskkk/x-trend-bot"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:bg-white/[0.07] transition">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1.5 font-medium">ブランチ</label>
          <input type="text" id="settings-branch" placeholder="main" value="main"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:bg-white/[0.07] transition">
        </div>
        <button onclick="saveSettings()"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2">

            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>

  <!-- Main Content -->

<script>
// ========== GitHub API Helper ==========
const GITHUB_API = 'https://api.github.com';
let usersData = null;
let usersSha = null;
let genresData = null;
let genresSha = null;

function getSettings() {
  return {
    token: localStorage.getItem('gh_token') || '',
    repo: localStorage.getItem('gh_repo') || 'msskkk/x-trend-bot',
    branch: localStorage.getItem('gh_branch') || 'main'
  };
}

function hasSettings() { return !!localStorage.getItem('gh_token'); }

function openSettings() {
  const s = getSettings();
  document.getElementById('settings-token').value = s.token;
  document.getElementById('settings-repo').value = s.repo;
  document.getElementById('settings-branch').value = s.branch;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const repo = document.getElementById('settings-repo').value.trim() || 'msskkk/x-trend-bot';
  const branch = document.getElementById('settings-branch').value.trim() || 'main';
  if (!token) { showToast('トークンを入力してください', 'error'); return; }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_branch', branch);
  document.getElementById('settings-modal').classList.add('hidden');
  showToast('設定を保存しました', 'success');
  loadPage();
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast px-4 py-3 rounded-xl text-sm flex items-center gap-2 ' +
    (type === 'error' ? 'bg-red-500/10 text-red-300 border border-red-500/20' : 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/20');
  const icon = type === 'error'
    ? '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
    : '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function readFile(path) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}?ref=${s.branch}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`Failed to read ${path}: ${resp.status}`);
  const data = await resp.json();
  const base64 = data.content.replace(/\s/g, '');
  const raw = await fetch('data:application/json;base64,' + base64);
  const content = await raw.json();
  return { content, sha: data.sha };
}

async function writeFile(path, content, sha, message) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}`;
  const body = {
    message: message || `Update ${path}`,
    content: btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(content, null, 2)))),
    sha: sha,
    branch: s.branch
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`Failed to write ${path}: ${resp.status}`);
  return await resp.json();
}

// ========== Genre Color Helpers ==========
function getGenreGradient(genre) {
  switch(genre) {
    case 'stocks': return 'from-blue-500 to-indigo-600';
    case 'crypto': return 'from-orange-400 to-yellow-500';
    case 'fx': return 'from-emerald-500 to-teal-600';
    default: return 'from-gray-500 to-gray-600';
  }
}
function getGenreBadge(genre) {
  switch(genre) {
    case 'stocks': return 'bg-blue-500/10 text-blue-400 border-blue-500/20';
    case 'crypto': return 'bg-orange-500/10 text-orange-400 border-orange-500/20';
    case 'fx': return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
    default: return 'bg-gray-500/10 text-gray-400 border-gray-500/20';
  }
}
function getGenreName(genreId) {
  if (!genresData || !genresData.genres) return genreId || '';
  const g = genresData.genres.find(g => g.id === genreId);
  return g ? g.name : (genreId || '');
}

// ========== Page Logic ==========
async function loadPage() {
  try {
    document.getElementById('api-status').textContent = '読み込み中...';
    const [uData, gData] = await Promise.all([
      readFile('config/users.json'),
      readFile('config/genres.json')
    ]);
    usersData = uData.content;
    usersSha = uData.sha;
    genresData = gData.content;
    genresSha = gData.sha;

    document.getElementById('api-status').textContent = 'API 接続済み';
    document.getElementById('api-status').className = 'text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20';

    populateGenreDropdown();
    renderUsers();
  } catch (err) {
    console.error(err);
    document.getElementById('api-status').textContent = 'API エラー';
    document.getElementById('api-status').className = 'text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20';
    showToast('データの読み込みに失敗しました: ' + err.message, 'error');
  }
}

function populateGenreDropdown() {
  const select = document.getElementById('add-genre');
  select.innerHTML = '';
  (genresData.genres || []).forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name;
    opt.className = 'bg-[#1e2130]';
    select.appendChild(opt);
  });
}

function renderUsers() {
  const container = document.getElementById('users-container');
  const users = usersData.users || [];

  if (users.length === 0) {
    container.innerHTML = `
      <div class="card rounded-2xl px-5 py-16 text-center">
        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <p class="text-sm text-gray-500">ユーザーが登録されていません</p>
        <p class="text-xs text-gray-600 mt-1">上のフォームからユーザーを追加してください</p>
      </div>`;
    return;
  }

  let html = `
    <div class="card rounded-2xl overflow-hidden">
      <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
        <span class="text-sm font-medium text-white">登録済みユーザー</span>
        <span class="text-xs text-gray-500 bg-white/5 px-2.5 py-1 rounded-full">${users.length} 件</span>
      </div>
      <div class="divide-y divide-white/5">`;

  users.forEach((user, idx) => {
    const enabled = user.enabled !== false;
    const initial = (user.display_name || user.username || '?')[0];
    const gradient = getGenreGradient(user.genre);
    const badgeCls = getGenreBadge(user.genre);
    html += `
      <div class="px-5 py-4 flex items-center gap-4 hover:bg-white/[0.02] transition ${!enabled ? 'opacity-50' : ''}">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br ${gradient} flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">
          ${escapeHtml(initial)}
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-medium text-sm text-white">${escapeHtml(user.display_name || user.username)}</div>
          <div class="text-xs text-gray-500 mt-0.5">@${escapeHtml(user.username)}</div>
        </div>
        <span class="text-xs px-2.5 py-1 rounded-full border ${badgeCls}">${escapeHtml(getGenreName(user.genre))}</span>
        ${enabled
          ? '<span class="flex items-center gap-1.5 text-xs text-emerald-400"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full"></span>有効</span>'
          : '<span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="w-1.5 h-1.5 bg-gray-500 rounded-full"></span>無効</span>'
        }
        <div class="flex items-center gap-1">
          <button onclick="toggleUser(${idx})" title="${enabled ? '無効にする' : '有効にする'}"
                  class="w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center transition text-gray-400 hover:text-white">
            ${enabled
              ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
              : '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
            }
          </button>
          <button onclick="deleteUser(${idx})" title="削除"
                  class="w-8 h-8 rounded-lg hover:bg-red-500/10 flex items-center justify-center transition text-gray-500 hover:text-red-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>`;
  });

  html += '</div></div>';
  container.innerHTML = html;
}

async function addUser() {
  const username = document.getElementById('add-username').value.trim().replace(/^@/, '');
  const displayName = document.getElementById('add-display-name').value.trim();
  const genre = document.getElementById('add-genre').value;

  if (!username) { showToast('ユーザー名を入力してください', 'error'); return; }
  if (usersData.users.some(u => u.username === username)) {
    showToast(`@${username} は既に登録されています`, 'error'); return;
  }

  usersData.users.push({
    username: username,
    display_name: displayName || username,
    genre: genre,
    enabled: true
  });

  try {
    const result = await writeFile('config/users.json', usersData, usersSha, `Add user @${username}`);
    usersSha = result.content.sha;
    document.getElementById('add-username').value = '';
    document.getElementById('add-display-name').value = '';
    showToast(`@${username} を追加しました`, 'success');
    renderUsers();
  } catch (err) {
    usersData.users.pop();
    showToast('保存に失敗しました: ' + err.message, 'error');
  }
}

async function toggleUser(idx) {
  const user = usersData.users[idx];
  user.enabled = !(user.enabled !== false);
  try {
    const result = await writeFile('config/users.json', usersData, usersSha, `Toggle user @${user.username}`);
    usersSha = result.content.sha;
    renderUsers();
  } catch (err) {
    user.enabled = !user.enabled;
    showToast('保存に失敗しました: ' + err.message, 'error');
  }
}

async function deleteUser(idx) {
  const user = usersData.users[idx];
  if (!confirm(`@${user.username} を削除しますか？`)) return;

  const removed = usersData.users.splice(idx, 1)[0];
  try {
    const result = await writeFile('config/users.json', usersData, usersSha, `Delete user @${user.username}`);
    usersSha = result.content.sha;
    showToast(`@${user.username} を削除しました`, 'success');
    renderUsers();
  } catch (err) {
    usersData.users.splice(idx, 0, removed);
    showToast('削除に失敗しました: ' + err.message, 'error');
  }
}

// ========== Init ==========
document.addEventListener('DOMContentLoaded', function() {
  if (!hasSettings()) {
    openSettings();
  } else {
    loadPage();
  }
});
</script>
