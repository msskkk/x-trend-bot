<script>
// ========== GitHub API Helper ==========
const GITHUB_API = 'https://api.github.com';
let genresData = null;
let genresSha = null;

function getSettings() {
  return {
    token: localStorage.getItem('gh_token') || '',
    repo: localStorage.getItem('gh_repo') || 'msskkk/x-trend-bot',
    branch: localStorage.getItem('gh_branch') || 'main'
  };
}

function hasSettings() { return !!localStorage.getItem('gh_token'); }

function openSettings() {
  const s = getSettings();
  document.getElementById('settings-token').value = s.token;
  document.getElementById('settings-repo').value = s.repo;
  document.getElementById('settings-branch').value = s.branch;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const repo = document.getElementById('settings-repo').value.trim() || 'msskkk/x-trend-bot';
  const branch = document.getElementById('settings-branch').value.trim() || 'main';
  if (!token) { showToast('トークンを入力してください', 'error'); return; }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_branch', branch);
  document.getElementById('settings-modal').classList.add('hidden');
  showToast('設定を保存しました', 'success');
  loadPage();
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast px-4 py-3 rounded-xl text-sm flex items-center gap-2 ' +
    (type === 'error' ? 'bg-red-500/10 text-red-300 border border-red-500/20' : 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/20');
  const icon = type === 'error'
    ? '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
    : '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function readFile(path) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}?ref=${s.branch}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`Failed to read ${path}: ${resp.status}`);
  const data = await resp.json();
  const binaryString = atob(data.content);
  const bytes = new Uint8Array(binaryString.length);
  for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
  const content = JSON.parse(new TextDecoder().decode(bytes));
  return { content, sha: data.sha };
}

async function writeFile(path, content, sha, message) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}`;
  const body = {
    message: message || `Update ${path}`,
    content: btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(content, null, 2)))),
    sha: sha,
    branch: s.branch
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`Failed to write ${path}: ${resp.status}`);
  return await resp.json();
}

// ========== Genre Helpers ==========
function getGenreIconBg(id) {
  switch(id) {
    case 'stocks': return 'bg-blue-500/15 text-blue-400';
    case 'crypto': return 'bg-orange-500/15 text-orange-400';
    case 'fx': return 'bg-emerald-500/15 text-emerald-400';
    default: return 'bg-violet-500/15 text-violet-400';
  }
}

function getGenreIcon(id) {
  switch(id) {
    case 'stocks':
      return '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>';
    case 'crypto':
      return '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
    case 'fx':
      return '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>';
    default:
      return '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>';
  }
}

// ========== Page Logic ==========
async function loadPage() {
  try {
    document.getElementById('api-status').textContent = '読み込み中...';
    const gData = await readFile('config/genres.json');
    genresData = gData.content;
    genresSha = gData.sha;

    document.getElementById('api-status').textContent = 'API 接続済み';
    document.getElementById('api-status').className = 'text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20';

    renderGenres();
  } catch (err) {
    console.error(err);
    document.getElementById('api-status').textContent = 'API エラー';
    document.getElementById('api-status').className = 'text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20';
    showToast('データの読み込みに失敗しました: ' + err.message, 'error');
  }
}

function renderGenres() {
  const container = document.getElementById('genres-container');
  const genres = genresData.genres || [];

  if (genres.length === 0) {
    container.innerHTML = `
      <div class="card rounded-2xl px-5 py-16 text-center">
        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
          </svg>
        </div>
        <p class="text-sm text-gray-500">ジャンルが登録されていません</p>
        <p class="text-xs text-gray-600 mt-1">上のフォームからジャンルを追加してください</p>
      </div>`;
    return;
  }

  let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
  genres.forEach((genre, idx) => {
    const enabled = genre.enabled !== false;
    const iconBg = getGenreIconBg(genre.id);
    const icon = getGenreIcon(genre.id);
    html += `
      <div class="card rounded-2xl p-5 ${!enabled ? 'opacity-50' : ''} hover:border-white/10 transition">
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center ${iconBg}">
            ${icon}
          </div>
          ${enabled
            ? '<span class="flex items-center gap-1.5 text-xs text-emerald-400"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full"></span>有効</span>'
            : '<span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="w-1.5 h-1.5 bg-gray-500 rounded-full"></span>無効</span>'
          }
        </div>
        <div class="mb-1">
          <div class="font-semibold text-sm text-white">${escapeHtml(genre.name)}</div>
          <div class="text-[11px] text-gray-600 font-mono mt-0.5">${escapeHtml(genre.id)}</div>
        </div>
        ${genre.description ? `<p class="text-xs text-gray-500 mt-2 leading-relaxed">${escapeHtml(genre.description)}</p>` : ''}
        <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
          <button onclick="toggleGenre(${idx})" class="flex-1 text-xs py-2 rounded-lg border border-white/10 hover:bg-white/5 text-gray-400 hover:text-white transition">
            ${enabled ? '無効にする' : '有効にする'}
          </button>
          <button onclick="deleteGenre(${idx})" class="px-3 py-2 rounded-lg border border-red-500/20 text-red-400 hover:bg-red-500/10 transition text-xs">
            削除
          </button>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

async function addGenre() {
  const id = document.getElementById('add-genre-id').value.trim();
  const name = document.getElementById('add-genre-name').value.trim();
  const desc = document.getElementById('add-genre-desc').value.trim();

  if (!id || !name) { showToast('IDと名前は必須です', 'error'); return; }
  if (genresData.genres.some(g => g.id === id)) {
    showToast(`ID "${id}" は既に存在します`, 'error'); return;
  }

  genresData.genres.push({
    id: id,
    name: name,
    description: desc,
    enabled: true
  });

  try {
    const result = await writeFile('config/genres.json', genresData, genresSha, `Add genre ${name}`);
    genresSha = result.content.sha;
    document.getElementById('add-genre-id').value = '';
    document.getElementById('add-genre-name').value = '';
    document.getElementById('add-genre-desc').value = '';
    showToast(`ジャンル「${name}」を追加しました`, 'success');
    renderGenres();
  } catch (err) {
    genresData.genres.pop();
    showToast('保存に失敗しました: ' + err.message, 'error');
  }
}

async function toggleGenre(idx) {
  const genre = genresData.genres[idx];
  genre.enabled = !(genre.enabled !== false);
  try {
    const result = await writeFile('config/genres.json', genresData, genresSha, `Toggle genre ${genre.name}`);
    genresSha = result.content.sha;
    renderGenres();
  } catch (err) {
    genre.enabled = !genre.enabled;
    showToast('保存に失敗しました: ' + err.message, 'error');
  }
}

async function deleteGenre(idx) {
  const genre = genresData.genres[idx];
  if (!confirm(`「${genre.name}」を削除しますか？`)) return;

  const removed = genresData.genres.splice(idx, 1)[0];
  try {
    const result = await writeFile('config/genres.json', genresData, genresSha, `Delete genre ${genre.name}`);
    genresSha = result.content.sha;
    showToast(`ジャンル「${genre.name}」を削除しました`, 'success');
    renderGenres();
  } catch (err) {
    genresData.genres.splice(idx, 0, removed);
    showToast('削除に失敗しました: ' + err.message, 'error');
  }
}

// ========== Init ==========
document.addEventListener('DOMContentLoaded', function() {
  if (!hasSettings()) {
    openSettings();
  } else {
    loadPage();
  }
});
</script>
