<script>
// ========== GitHub API Helper ==========
const GITHUB_API = 'https://api.github.com';

function getSettings() {
  return {
    token: localStorage.getItem('gh_token') || '',
    repo: localStorage.getItem('gh_repo') || 'msskkk/x-trend-bot',
    branch: localStorage.getItem('gh_branch') || 'main'
  };
}

function hasSettings() {
  return !!localStorage.getItem('gh_token');
}

function openSettings() {
  const s = getSettings();
  document.getElementById('settings-token').value = s.token;
  document.getElementById('settings-repo').value = s.repo;
  document.getElementById('settings-branch').value = s.branch;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const repo = document.getElementById('settings-repo').value.trim() || 'msskkk/x-trend-bot';
  const branch = document.getElementById('settings-branch').value.trim() || 'main';
  if (!token) { showToast('トークンを入力してください', 'error'); return; }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_branch', branch);
  document.getElementById('settings-modal').classList.add('hidden');
  showToast('設定を保存しました', 'success');
  loadDashboard();
}

function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast px-4 py-3 rounded-xl text-sm flex items-center gap-2 ' +
    (type === 'error' ? 'bg-red-500/10 text-red-300 border border-red-500/20' : 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/20');
  const icon = type === 'error'
    ? '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
    : '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

async function readFile(path) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}?ref=${s.branch}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`Failed to read ${path}: ${resp.status}`);
  const data = await resp.json();
  const binaryString = atob(data.content);
  const bytes = new Uint8Array(binaryString.length);
  for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
  const content = JSON.parse(new TextDecoder().decode(bytes));
  return { content, sha: data.sha };
}

async function writeFile(path, content, sha, message) {
  const s = getSettings();
  const url = `${GITHUB_API}/repos/${s.repo}/contents/${path}`;
  const body = {
    message: message || `Update ${path}`,
    content: btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(content, null, 2)))),
    sha: sha,
    branch: s.branch
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `token ${s.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`Failed to write ${path}: ${resp.status}`);
  return await resp.json();
}

// ========== Dashboard Logic ==========
async function loadDashboard() {
  try {
    document.getElementById('api-status').textContent = '読み込み中...';

    const [usersData, genresData, historyData] = await Promise.all([
      readFile('config/users.json'),
      readFile('config/genres.json'),
      readFile('config/history.json')
    ]);

    const users = usersData.content.users || [];
    const genres = genresData.content.genres || [];
    const posts = historyData.content.posts || [];

    const enabledUsers = users.filter(u => u.enabled !== false).length;
    const enabledGenres = genres.filter(g => g.enabled !== false).length;

    document.getElementById('stat-users').textContent = enabledUsers;
    document.getElementById('stat-genres').textContent = enabledGenres;
    document.getElementById('stat-posts').textContent = posts.length;
    document.getElementById('api-status').textContent = 'API 接続済み';
    document.getElementById('api-status').className = 'text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20';

    renderRecentPosts(posts.slice(0, 5));
  } catch (err) {
    console.error(err);
    document.getElementById('api-status').textContent = 'API エラー';
    document.getElementById('api-status').className = 'text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20';
    document.getElementById('recent-posts-container').innerHTML = `
      <div class="px-5 py-16 text-center">
        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <p class="text-sm text-gray-500">データの読み込みに失敗しました</p>
        <p class="text-xs text-gray-600 mt-1">設定を確認してください</p>
      </div>`;
    showToast('データの読み込みに失敗しました: ' + err.message, 'error');
  }
}

function renderRecentPosts(posts) {
  const container = document.getElementById('recent-posts-container');
  if (!posts || posts.length === 0) {
    container.innerHTML = `
      <div class="px-5 py-16 text-center">
        <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <p class="text-sm text-gray-500">まだ投稿がありません</p>
        <p class="text-xs text-gray-600 mt-1">Botが実行されると、ここに投稿が表示されます</p>
      </div>`;
    return;
  }

  let html = '<div class="divide-y divide-white/5">';
  posts.forEach(post => {
    const genres = (post.genres || []).map(g =>
      `<span class="text-[11px] bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-full">${escapeHtml(g)}</span>`
    ).join('');
    const postedAt = post.posted_at ? post.posted_at.substring(0, 10) : '--';
    html += `
      <div class="px-5 py-4 hover:bg-white/[0.02] transition">
        <div class="flex gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-full flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1.5">
              <span class="text-sm font-medium text-white">X Trend Bot</span>
              <span class="text-xs text-gray-500">@xtrend_bot</span>
              <span class="text-gray-700">&middot;</span>
              <span class="text-xs text-gray-500">${postedAt}</span>
            </div>
            <p class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">${escapeHtml(post.text || '')}</p>
            <div class="flex flex-wrap gap-1.5 mt-2.5">${genres}</div>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== Init ==========
document.addEventListener('DOMContentLoaded', function() {
  if (!hasSettings()) {
    openSettings();
  } else {
    loadDashboard();
  }
});
</script>
</body>
</html>
